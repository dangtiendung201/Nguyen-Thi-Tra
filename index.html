<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css" />
    <title>Intro Form</title>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc
        } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGDjzUXl47rBjM7Lmz0ZJAe-F9f9U6N4A",
            authDomain: "nguyen-thi-tra.firebaseapp.com",
            projectId: "nguyen-thi-tra",
            storageBucket: "nguyen-thi-tra.firebasestorage.app",
            messagingSenderId: "1085990834449",
            appId: "1:1085990834449:web:f917e5ead4adff4e863cb0",
            measurementId: "G-VM056TTHV1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Ant Design -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5/dist/reset.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5/dist/antd.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/dayjs/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@5/dist/antd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;

            background:
                radial-gradient(circle at top, #1f1f1f, #000);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            width: 420px;
            max-width: 90%;
            padding: 35px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 0 30px rgba(255, 255, 255, 0.1);
        }

        .title {
            text-align: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .music-btn {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .ant-form-item-label label {
            color: white !important;
            font-weight: 500;
        }

        .ant-input,
        .ant-picker,
        .ant-input-textarea textarea {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: white !important;
            height: 45px;
            border-radius: 12px;
        }

        .ant-input::placeholder,
        .ant-input-textarea textarea::placeholder {
            color: rgba(255, 255, 255, 0.45) !important;
        }

        .ant-picker-input input {
            color: white !important;
        }

        .ant-btn {
            height: 48px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="shooting-star"></div>

    <div id="root"></div>

    <!-- NHẠC -->
    <audio id="introMusic" loop>
        <source src="./assets/Dancing In The Dark.mp3" type="audio/mpeg">
    </audio>

    <script type="text/babel">

        const audio = document.getElementById("introMusic");

        const {
            Form,
            Input,
            Button,
            DatePicker,
            message
        } = antd;

        function App() {

            const playMusic = async () => {
                try {
                    await audio.play();
                    message.success("Nhạc đã bật 🎵");
                } catch (err) {
                    console.log(err);
                }
            };

            const onFinish = async (values) => {

                try {

                    await addDoc(
                        collection(db, "messages"),
                        {
                            birthday: values.birthday.format("DD/MM/YYYY"),
                            message: values.message || "",
                            createdAt: new Date()
                        }
                    );

                    localStorage.setItem(
                        "musicTime",
                        audio.currentTime
                    );

                    message.success("Đã lưu thành công ❤️");

                    setTimeout(() => {
                        window.location.href = "planet.html";
                    }, 1200);

                } catch (error) {

                    console.error(error);
                    message.error("Lưu dữ liệu thất bại");

                }
            };

            return (
                <div className="form-container">

                    <div className="title">
                        Welcome
                    </div>

                    <button
                        className="music-btn"
                        onClick={playMusic}
                    >
                        🎵 Bật nhạc
                    </button>

                    <Form
                        layout="vertical"
                        onFinish={onFinish}
                    >

                        <Form.Item
                            label="Ngày sinh"
                            name="birthday"
                            rules={[
                                {
                                    required: true,
                                    message: "Vui lòng chọn ngày sinh"
                                }
                            ]}
                        >
                            <DatePicker
                                style={{ width: "100%" }}
                                format="DD/MM/YYYY"
                            />
                        </Form.Item>

                        <Form.Item
                            label="Lời nhắn"
                            name="message"
                        >
                            <Input.TextArea
                                rows={5}
                                placeholder="Cho anh biết sở thích của em nhé (Ko nhập gì cũng được nha <3)"
                            />
                        </Form.Item>

                        <Button
                            type="primary"
                            htmlType="submit"
                            block
                        >
                            Submit
                        </Button>

                    </Form>

                </div>
            );
        }

        ReactDOM.createRoot(
            document.getElementById("root")
        ).render(<App />);

    </script>

</body>

</html>
